<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Memuar's Flow</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: #0a0c12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Courier New', monospace;
            margin: 0;
            padding: 16px;
        }

        .game-container {
            background: #0f1117;
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 520px;
            width: 100%;
        }

        .game-panel {
            background: #07090e;
            border-radius: 32px;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .title {
            color: #c0d0e6;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .title span {
            color: #2ecc71;
        }

        .info {
            display: flex;
            gap: 16px;
            color: #5a6e8a;
            font-size: 13px;
        }
        .info span {
            color: #c0d0e6;
            font-weight: bold;
        }

        .board-wrapper {
            position: relative;
            background: #0f1117;
            border-radius: 24px;
            padding: 12px;
            margin-bottom: 16px;
            touch-action: none;
        }

        .board {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #0a0c12;
            border-radius: 16px;
            touch-action: none;
        }

        .cell {
            position: absolute;
            border-radius: 6px;
            background: #1a1f2a;
            transition: background 0.1s ease;
            cursor: pointer;
        }

        .cell.blocked {
            background: transparent;
            cursor: default;
        }

        .cell.start {
            background: #2ecc71;
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(46, 204, 113, 0.4);
        }

        .cell.end {
            background: #e74c3c;
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(231, 76, 60, 0.4);
        }

        .cell.path {
            background: #3498db;
        }

        .cell.highlight {
            background: #f39c12 !important;
            animation: pulse 0.5s ease;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: #1a1f2a;
            border: none;
            color: #c0d0e6;
            font-family: inherit;
            font-size: 16px;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 3px 0 #0b0e12;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0b0e12;
        }

        .btn-primary {
            background: #2ecc71;
            color: #0a0c12;
            box-shadow: 0 3px 0 #1e8a4c;
        }

        .status {
            text-align: center;
            margin-top: 16px;
            color: #e67e22;
            font-weight: bold;
            font-size: 14px;
            background: #0f1117;
            padding: 8px;
            border-radius: 60px;
        }

        @media (max-width: 500px) {
            .game-container { padding: 12px; border-radius: 32px; }
            .game-panel { padding: 12px; }
            .title { font-size: 18px; }
            .info { font-size: 11px; }
            button { font-size: 14px; padding: 10px 18px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-panel">
        <div class="header">
            <div class="title">MEMUAR<span>'S</span> FLOW</div>
            <div class="info">
                <div>УРОВЕНЬ <span id="levelDisplay">1</span></div>
                <div>ШАГИ <span id="stepsDisplay">0</span></div>
            </div>
        </div>

        <div class="board-wrapper">
            <div class="board" id="board"></div>
        </div>

        <div class="controls">
            <button id="resetBtn" class="btn-primary">🔄 ЗАНОВО</button>
            <button id="hintBtn">💡 ПОДСКАЗКА</button>
        </div>

        <div class="status" id="gameStatus">🌀 ПРОВЕДИ ЛИНИЮ ОТ ТОЧКИ ДО ТОЧКИ</div>
    </div>
</div>

<script>
    // ================================================================
    //  СВЯЖИ ТОЧКИ (FLOW) — С ПРОВЕДЕНИЕМ ЛИНИИ
    //  Зажимаешь на старте, тянешь по клеткам, отпускаешь
    // ================================================================

    (function() {
        'use strict';

        const MIN_SIZE = 5;
        const MAX_SIZE = 7;

        let board = [];
        let size = 5;
        let level = 1;
        let steps = 0;
        let start = null;
        let end = null;
        let isComplete = false;
        let isLocked = false;
        let isDrawing = false;
        let pathCells = [];

        const boardEl = document.getElementById('board');
        const levelDisplay = document.getElementById('levelDisplay');
        const stepsDisplay = document.getElementById('stepsDisplay');
        const gameStatusSpan = document.getElementById('gameStatus');

        // ---- ГЕНЕРАЦИЯ УРОВНЯ ----
        function generateLevel() {
            size = Math.floor(Math.random() * (MAX_SIZE - MIN_SIZE + 1)) + MIN_SIZE;
            board = Array.from({ length: size }, () => Array(size).fill(0));

            // Препятствия
            const blockCount = Math.floor(size * size * 0.08);
            let placed = 0;
            while (placed < blockCount) {
                const r = Math.floor(Math.random() * size);
                const c = Math.floor(Math.random() * size);
                if (board[r][c] === 0) {
                    board[r][c] = 1;
                    placed++;
                }
            }

            // Старт и финиш на краях
            const freeEdges = [];
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] === 0 && (r === 0 || r === size - 1 || c === 0 || c === size - 1)) {
                        freeEdges.push({r, c});
                    }
                }
            }

            if (freeEdges.length < 2) {
                const free = [];
                for (let r = 0; r < size; r++) {
                    for (let c = 0; c < size; c++) {
                        if (board[r][c] === 0) free.push({r, c});
                    }
                }
                if (free.length < 2) { generateLevel(); return; }
                start = free[0];
                end = free[free.length - 1];
            } else {
                start = freeEdges[0];
                end = freeEdges[Math.floor(Math.random() * freeEdges.length)];
                if (!end || (start.r === end.r && start.c === end.c)) {
                    end = freeEdges[freeEdges.length - 1];
                }
            }

            board[start.r][start.c] = 3;
            board[end.r][end.c] = 4;

            steps = 0;
            isComplete = false;
            isLocked = false;
            pathCells = [];
            render();
            updateUI();
            gameStatusSpan.innerHTML = "🌀 ТЯНИ ЛИНИЮ ОТ ЗЕЛЁНОЙ К КРАСНОЙ";
        }

        // ---- ОТРИСОВКА ----
        function render() {
            boardEl.innerHTML = '';
            const cellSize = boardEl.clientWidth / size;

            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.r = r;
                    cell.dataset.c = c;
                    cell.style.width = cellSize + 'px';
                    cell.style.height = cellSize + 'px';
                    cell.style.left = (c * cellSize) + 'px';
                    cell.style.top = (r * cellSize) + 'px';

                    const val = board[r][c];
                    if (val === 1) cell.classList.add('blocked');
                    else if (val === 3) cell.classList.add('start');
                    else if (val === 4) cell.classList.add('end');
                    else if (val === 2) cell.classList.add('path');

                    // События для рисования
                    cell.addEventListener('mousedown', (e) => onCellDown(r, c, e));
                    cell.addEventListener('mouseenter', (e) => onCellEnter(r, c, e));
                    cell.addEventListener('mouseup', (e) => onCellUp(r, c, e));

                    cell.addEventListener('touchstart', (e) => onCellDown(r, c, e));
                    cell.addEventListener('touchmove', (e) => onCellTouchMove(r, c, e));
                    cell.addEventListener('touchend', (e) => onCellUp(r, c, e));

                    boardEl.appendChild(cell);
                }
            }
        }

        // ---- РИСОВАНИЕ ЛИНИИ ----
        function onCellDown(r, c, e) {
            if (isComplete || isLocked) return;
            if (board[r][c] === 1) return;

            // Начинаем рисование только со старта
            if (board[r][c] === 3) {
                isDrawing = true;
                pathCells = [{r, c}];
                clearPath();
                board[r][c] = 3;
                steps = 0;
                updateUI();
                render();
            }
            e.preventDefault();
        }

        function onCellEnter(r, c, e) {
            if (!isDrawing || isComplete || isLocked) return;
            if (board[r][c] === 1) return;
            if (board[r][c] === 4) {
                // Попытка завершить линию
                finishLine();
                return;
            }

            const last = pathCells[pathCells.length - 1];
            if (!last) return;

            // Проверяем, что клетка соседняя (по горизонтали или вертикали)
            const dr = Math.abs(r - last.r);
            const dc = Math.abs(c - last.c);
            if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
                if (!pathCells.some(p => p.r === r && p.c === c)) {
                    pathCells.push({r, c});
                    board[r][c] = 2;
                    steps++;
                    updateUI();
                    render();
                }
            }
            e.preventDefault();
        }

        function onCellTouchMove(r, c, e) {
            e.preventDefault();
            const touch = e.touches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            if (target && target.classList.contains('cell')) {
                const rr = parseInt(target.dataset.r);
                const cc = parseInt(target.dataset.c);
                if (!isNaN(rr) && !isNaN(cc)) {
                    onCellEnter(rr, cc, e);
                }
            }
        }

        function onCellUp(r, c, e) {
            if (isDrawing) {
                finishLine();
                isDrawing = false;
            }
            e.preventDefault();
        }

        function finishLine() {
            isDrawing = false;
            if (pathCells.length < 2) {
                gameStatusSpan.innerHTML = "⚠️ ЛИНИЯ СЛИШКОМ КОРОТКАЯ";
                return;
            }

            // Проверяем, что финиш достигнут
            const last = pathCells[pathCells.length - 1];
            if (last.r === end.r && last.c === end.c) {
                if (isAllFilled()) {
                    isComplete = true;
                    gameStatusSpan.innerHTML = "🎉 УРОВЕНЬ ПРОЙДЕН!";
                    setTimeout(() => {
                        level++;
                        generateLevel();
                    }, 800);
                } else {
                    gameStatusSpan.innerHTML = "❌ НЕ ВСЕ КЛЕТКИ ЗАПОЛНЕНЫ!";
                }
            } else {
                gameStatusSpan.innerHTML = "❌ НУЖНО ДОЙТИ ДО КРАСНОЙ ТОЧКИ!";
            }
            render();
        }

        // ---- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----
        function clearPath() {
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] === 2) board[r][c] = 0;
                }
            }
            board[start.r][start.c] = 3;
            board[end.r][end.c] = 4;
        }

        function isAllFilled() {
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] === 0) return false;
                }
            }
            return true;
        }

        // ---- ПОДСКАЗКА ----
        function showHint() {
            if (isComplete) return;
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] === 2 || board[r][c] === 3) {
                        const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
                        for (const d of dirs) {
                            const nr = r + d[0];
                            const nc = c + d[1];
                            if (nr < 0 || nr >= size || nc < 0 || nc >= size) continue;
                            if (board[nr][nc] === 0) {
                                const cells = boardEl.querySelectorAll('.cell');
                                cells.forEach(cell => {
                                    if (parseInt(cell.dataset.r) === nr && parseInt(cell.dataset.c) === nc) {
                                        cell.classList.add('highlight');
                                        setTimeout(() => cell.classList.remove('highlight'), 800);
                                    }
                                });
                                gameStatusSpan.innerHTML = `💡 КЛЕТКА (${nr+1}, ${nc+1})`;
                                return;
                            }
                        }
                    }
                }
            }
            gameStatusSpan.innerHTML = "😅 НЕТ ДОСТУПНЫХ КЛЕТОК";
        }

        // ---- СБРОС ----
        function resetLevel() {
            clearPath();
            board[start.r][start.c] = 3;
            board[end.r][end.c] = 4;
            steps = 0;
            isComplete = false;
            isLocked = false;
            pathCells = [];
            updateUI();
            render();
            gameStatusSpan.innerHTML = "🌀 НАЧНИ ЗАНОВО";
        }

        // ---- UI ----
        function updateUI() {
            levelDisplay.textContent = level;
            stepsDisplay.textContent = steps;
        }

        // ---- ИНИЦИАЛИЗАЦИЯ ----
        function init() {
            generateLevel();

            document.getElementById('resetBtn').addEventListener('click', resetLevel);
            document.getElementById('hintBtn').addEventListener('click', showHint);

            window.addEventListener('resize', render);
        }

        init();
    })();
</script>
</body>
</html>
