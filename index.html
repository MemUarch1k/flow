<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Memuar's Flow</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: #0a0c12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Courier New', monospace;
            margin: 0;
            padding: 16px;
        }

        .game-container {
            background: #0f1117;
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 520px;
            width: 100%;
        }

        .game-panel {
            background: #07090e;
            border-radius: 32px;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .title {
            color: #c0d0e6;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .title span {
            color: #2ecc71;
        }

        .info {
            display: flex;
            gap: 16px;
            color: #5a6e8a;
            font-size: 13px;
        }
        .info span {
            color: #c0d0e6;
            font-weight: bold;
        }

        .board-wrapper {
            position: relative;
            background: #0f1117;
            border-radius: 24px;
            padding: 12px;
            margin-bottom: 16px;
            touch-action: none;
        }

        .board {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #0a0c12;
            border-radius: 16px;
            touch-action: none;
        }

        .cell {
            position: absolute;
            border-radius: 6px;
            background: #1a1f2a;
            transition: background 0.1s ease;
            cursor: pointer;
        }

        .cell.blocked {
            background: transparent;
            cursor: default;
        }

        .cell.start {
            background: #2ecc71;
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(46, 204, 113, 0.4);
        }

        .cell.end {
            background: #e74c3c;
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(231, 76, 60, 0.4);
        }

        .cell.path {
            background: #3498db;
        }

        .cell.highlight {
            background: #f39c12 !important;
            animation: pulse 0.5s ease;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: #1a1f2a;
            border: none;
            color: #c0d0e6;
            font-family: inherit;
            font-size: 16px;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 3px 0 #0b0e12;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0b0e12;
        }

        .btn-primary {
            background: #2ecc71;
            color: #0a0c12;
            box-shadow: 0 3px 0 #1e8a4c;
        }

        .status {
            text-align: center;
            margin-top: 16px;
            color: #e67e22;
            font-weight: bold;
            font-size: 14px;
            background: #0f1117;
            padding: 8px;
            border-radius: 60px;
        }

        @media (max-width: 500px) {
            .game-container { padding: 12px; border-radius: 32px; }
            .game-panel { padding: 12px; }
            .title { font-size: 18px; }
            .info { font-size: 11px; }
            button { font-size: 14px; padding: 10px 18px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-panel">
        <div class="header">
            <div class="title">MEMUAR<span>'S</span> FLOW</div>
            <div class="info">
                <div>УРОВЕНЬ <span id="levelDisplay">1</span></div>
                <div>ШАГИ <span id="stepsDisplay">0</span></div>
            </div>
        </div>

        <div class="board-wrapper">
            <div class="board" id="board"></div>
        </div>

        <div class="controls">
            <button id="resetBtn" class="btn-primary">🔄 ЗАНОВО</button>
            <button id="hintBtn">💡 ПОДСКАЗКА</button>
        </div>

        <div class="status" id="gameStatus">🌀 ТЯНИ ЛИНИЮ ОТ ЗЕЛЁНОЙ К КРАСНОЙ</div>
    </div>
</div>

<script>
    // ================================================================
    //  FLOW — ГАРАНТИРОВАННО РЕШАЕМЫЕ УРОВНИ
    //  Алгоритм: строим путь, потом проверяем, что его можно пройти
    // ================================================================

    (function() {
        'use strict';

        const MIN_SIZE = 5;
        const MAX_SIZE = 7;

        let board = [];
        let size = 5;
        let level = 1;
        let steps = 0;
        let start = null;
        let end = null;
        let isComplete = false;
        let isDrawing = false;
        let pathCells = [];

        const boardEl = document.getElementById('board');
        const levelDisplay = document.getElementById('levelDisplay');
        const stepsDisplay = document.getElementById('stepsDisplay');
        const gameStatusSpan = document.getElementById('gameStatus');

        // ---- ГЕНЕРАЦИЯ УРОВНЯ (с проверкой) ----
        function generateLevel() {
            size = Math.floor(Math.random() * (MAX_SIZE - MIN_SIZE + 1)) + MIN_SIZE;
            board = Array.from({ length: size }, () => Array(size).fill(0));

            let valid = false;
            let attempts = 0;
            while (!valid && attempts < 50) {
                attempts++;
                board = Array.from({ length: size }, () => Array(size).fill(0));

                // Строим простой путь "змейкой" через все клетки
                let path = [];
                for (let r = 0; r < size; r++) {
                    if (r % 2 === 0) {
                        for (let c = 0; c < size; c++) path.push({r, c});
                    } else {
                        for (let c = size - 1; c >= 0; c--) path.push({r, c});
                    }
                }

                // Перемешиваем путь (делаем его не таким прямолинейным)
                if (size > 5) {
                    for (let i = 0; i < path.length; i += 2) {
                        if (i + 1 < path.length && Math.random() > 0.6) {
                            const temp = path[i];
                            path[i] = path[i + 1];
                            path[i + 1] = temp;
                        }
                    }
                }

                start = path[0];
                end = path[path.length - 1];

                for (let p of path) {
                    board[p.r][p.c] = 2;
                }
                board[start.r][start.c] = 3;
                board[end.r][end.c] = 4;

                // Добавляем препятствия
                const blockCount = Math.floor(size * size * (0.05 + Math.random() * 0.1));
                let placed = 0;
                let blockAttempts = 0;
                while (placed < blockCount && blockAttempts < 200) {
                    blockAttempts++;
                    const r = Math.floor(Math.random() * size);
                    const c = Math.floor(Math.random() * size);
                    if (board[r][c] === 2 && !(r === start.r && c === start.c) && !(r === end.r && c === end.c)) {
                        // Проверяем, что этот блок не отрезает путь
                        board[r][c] = 0; // временно убираем
                        // Проверяем, можно ли пройти от старта до финиша
                        const hasPath = hasValidPath();
                        if (hasPath) {
                            board[r][c] = 1; // ставим блок
                            placed++;
                        } else {
                            board[r][c] = 2; // возвращаем
                        }
                    }
                }

                // Проверяем, что все клетки заполнены или заблокированы
                let allCovered = true;
                for (let r = 0; r < size; r++) {
                    for (let c = 0; c < size; c++) {
                        if (board[r][c] === 0) allCovered = false;
                    }
                }
                valid = allCovered;
            }

            // Если не удалось — перезапускаем генерацию
            if (!valid) {
                generateLevel();
                return;
            }

            steps = 0;
            isComplete = false;
            pathCells = [];
            render();
            updateUI();
            gameStatusSpan.innerHTML = "🌀 ТЯНИ ЛИНИЮ ОТ ЗЕЛЁНОЙ К КРАСНОЙ";
        }

        // ---- ПРОВЕРКА, ЕСТЬ ЛИ ПУТЬ ОТ СТАРТА ДО ФИНИША ----
        function hasValidPath() {
            const visited = new Set();
            const queue = [{r: start.r, c: start.c}];
            while (queue.length > 0) {
                const {r, c} = queue.shift();
                const key = `${r},${c}`;
                if (visited.has(key)) continue;
                visited.add(key);
                if (r === end.r && c === end.c) return true;
                const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
                for (const d of dirs) {
                    const nr = r + d[0];
                    const nc = c + d[1];
                    if (nr < 0 || nr >= size || nc < 0 || nc >= size) continue;
                    if (board[nr][nc] === 1 || board[nr][nc] === 0) continue;
                    if (!visited.has(`${nr},${nc}`)) {
                        queue.push({r: nr, c: nc});
                    }
                }
            }
            return false;
        }

        // ---- ОТРИСОВКА ----
        function render() {
            boardEl.innerHTML = '';
            const cellSize = boardEl.clientWidth / size;

            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.r = r;
                    cell.dataset.c = c;
                    cell.style.width = cellSize + 'px';
                    cell.style.height = cellSize + 'px';
                    cell.style.left = (c * cellSize) + 'px';
                    cell.style.top = (r * cellSize) + 'px';

                    const val = board[r][c];
                    if (val === 1) cell.classList.add('blocked');
                    else if (val === 3) cell.classList.add('start');
                    else if (val === 4) cell.classList.add('end');
                    else if (val === 2) cell.classList.add('path');

                    boardEl.appendChild(cell);
                }
            }
        }

        // ---- ЛОГИКА ПРОВЕДЕНИЯ ЛИНИИ ----
        function startDrawing(r, c) {
            if (isComplete) return;
            if (board[r][c] === 1) return;
            if (board[r][c] !== 3) return;

            isDrawing = true;
            pathCells = [{r, c}];

            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size; j++) {
                    if (board[i][j] === 2) board[i][j] = 0;
                }
            }
            board[start.r][start.c] = 3;
            board[end.r][end.c] = 4;
            steps = 0;
            updateUI();
            render();
        }

        function continueDrawing(r, c) {
            if (!isDrawing || isComplete) return;
            if (board[r][c] === 1) return;
            if (board[r][c] === 3 && pathCells.length > 0) return;

            const last = pathCells[pathCells.length - 1];
            const dr = Math.abs(r - last.r);
            const dc = Math.abs(c - last.c);
            const isAdjacent = (dr === 1 && dc === 0) || (dr === 0 && dc === 1);

            if (!isAdjacent) return;
            if (pathCells.some(p => p.r === r && p.c === c)) return;

            if (board[r][c] === 4) {
                pathCells.push({r, c});
                board[r][c] = 2;
                steps++;
                render();
                finishDrawing();
                return;
            }

            pathCells.push({r, c});
            board[r][c] = 2;
            steps++;
            updateUI();
            render();
        }

        function finishDrawing() {
            isDrawing = false;
            const last = pathCells[pathCells.length - 1];
            if (!last) return;

            if (last.r === end.r && last.c === end.c) {
                if (isAllFilled()) {
                    isComplete = true;
                    gameStatusSpan.innerHTML = "🎉 УРОВЕНЬ ПРОЙДЕН!";
                    setTimeout(() => {
                        level++;
                        generateLevel();
                    }, 800);
                } else {
                    gameStatusSpan.innerHTML = "❌ НЕ ВСЕ КЛЕТКИ ЗАПОЛНЕНЫ!";
                }
            } else {
                gameStatusSpan.innerHTML = "❌ НУЖНО ДОЙТИ ДО КРАСНОЙ ТОЧКИ!";
            }
            render();
        }

        function isAllFilled() {
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] === 0) return false;
                }
            }
            return true;
        }

        function resetLevel() {
            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size; j++) {
                    if (board[i][j] === 2) board[i][j] = 0;
                }
            }
            board[start.r][start.c] = 3;
            board[end.r][end.c] = 4;
            steps = 0;
            isComplete = false;
            pathCells = [];
            updateUI();
            render();
            gameStatusSpan.innerHTML = "🌀 НАЧНИ ЗАНОВО";
        }

        function showHint() {
            if (isComplete) return;
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] === 2 || board[r][c] === 3) {
                        const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
                        for (const d of dirs) {
                            const nr = r + d[0];
                            const nc = c + d[1];
                            if (nr < 0 || nr >= size || nc < 0 || nc >= size) continue;
                            if (board[nr][nc] === 0) {
                                const cell = boardEl.querySelector(`.cell[data-r="${nr}"][data-c="${nc}"]`);
                                if (cell) {
                                    cell.classList.add('highlight');
                                    setTimeout(() => cell.classList.remove('highlight'), 800);
                                }
                                gameStatusSpan.innerHTML = `💡 КЛЕТКА (${nr+1}, ${nc+1})`;
                                return;
                            }
                        }
                    }
                }
            }
            gameStatusSpan.innerHTML = "😅 НЕТ ДОСТУПНЫХ КЛЕТОК";
        }

        function setupEvents() {
            boardEl.addEventListener('mousedown', (e) => {
                const cell = e.target.closest('.cell');
                if (!cell) return;
                const r = parseInt(cell.dataset.r);
                const c = parseInt(cell.dataset.c);
                startDrawing(r, c);
            });

            boardEl.addEventListener('mouseover', (e) => {
                const cell = e.target.closest('.cell');
                if (!cell) return;
                const r = parseInt(cell.dataset.r);
                const c = parseInt(cell.dataset.c);
                continueDrawing(r, c);
            });

            document.addEventListener('mouseup', () => {
                if (isDrawing) finishDrawing();
            });

            boardEl.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                const target = document.elementFromPoint(touch.clientX, touch.clientY);
                const cell = target?.closest('.cell');
                if (!cell) return;
                const r = parseInt(cell.dataset.r);
                const c = parseInt(cell.dataset.c);
                startDrawing(r, c);
                e.preventDefault();
            }, { passive: false });

            boardEl.addEventListener('touchmove', (e) => {
                const touch = e.touches[0];
                const target = document.elementFromPoint(touch.clientX, touch.clientY);
                const cell = target?.closest('.cell');
                if (!cell) return;
                const r = parseInt(cell.dataset.r);
                const c = parseInt(cell.dataset.c);
                continueDrawing(r, c);
                e.preventDefault();
            }, { passive: false });

            document.addEventListener('touchend', () => {
                if (isDrawing) finishDrawing();
            });
        }

        function updateUI() {
            levelDisplay.textContent = level;
            stepsDisplay.textContent = steps;
        }

        function init() {
            generateLevel();
            setupEvents();
            document.getElementById('resetBtn').addEventListener('click', resetLevel);
            document.getElementById('hintBtn').addEventListener('click', showHint);
            window.addEventListener('resize', render);
        }

        init();
    })();
</script>
</body>
</html>
