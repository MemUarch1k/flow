<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Memuar's Flow</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: #0a0c12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Courier New', monospace;
            margin: 0;
            padding: 16px;
        }

        .game-container {
            background: #0f1117;
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 520px;
            width: 100%;
        }

        .game-panel {
            background: #07090e;
            border-radius: 32px;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .title {
            color: #c0d0e6;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .title span {
            color: #2ecc71;
        }

        .info {
            display: flex;
            gap: 16px;
            color: #5a6e8a;
            font-size: 13px;
        }
        .info span {
            color: #c0d0e6;
            font-weight: bold;
        }

        .board-wrapper {
            position: relative;
            background: #0f1117;
            border-radius: 24px;
            padding: 12px;
            margin-bottom: 16px;
            touch-action: none;
        }

        .board {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #0a0c12;
            border-radius: 16px;
            touch-action: none;
        }

        .cell {
            position: absolute;
            border-radius: 6px;
            background: #1a1f2a;
            transition: background 0.1s ease;
            cursor: pointer;
        }

        .cell.blocked {
            background: transparent;
            cursor: default;
        }

        .cell.start {
            background: #2ecc71;
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(46, 204, 113, 0.4);
        }

        .cell.end {
            background: #e74c3c;
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(231, 76, 60, 0.4);
        }

        .cell.path {
            background: #3498db;
        }

        .cell.path.start {
            background: #2ecc71;
        }
        .cell.path.end {
            background: #e74c3c;
        }

        .cell.highlight {
            background: #2a2f3e;
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: #1a1f2a;
            border: none;
            color: #c0d0e6;
            font-family: inherit;
            font-size: 16px;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 3px 0 #0b0e12;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0b0e12;
        }

        .btn-primary {
            background: #2ecc71;
            color: #0a0c12;
            box-shadow: 0 3px 0 #1e8a4c;
        }

        .status {
            text-align: center;
            margin-top: 16px;
            color: #e67e22;
            font-weight: bold;
            font-size: 14px;
            background: #0f1117;
            padding: 8px;
            border-radius: 60px;
        }

        @media (max-width: 500px) {
            .game-container { padding: 12px; border-radius: 32px; }
            .game-panel { padding: 12px; }
            .title { font-size: 18px; }
            .info { font-size: 11px; }
            button { font-size: 14px; padding: 10px 18px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-panel">
        <div class="header">
            <div class="title">MEMUAR<span>'S</span> FLOW</div>
            <div class="info">
                <div>УРОВЕНЬ <span id="levelDisplay">1</span></div>
                <div>ШАГИ <span id="stepsDisplay">0</span></div>
            </div>
        </div>

        <div class="board-wrapper">
            <div class="board" id="board"></div>
        </div>

        <div class="controls">
            <button id="resetBtn" class="btn-primary">🔄 ЗАНОВО</button>
            <button id="hintBtn">💡 ПОДСКАЗКА</button>
        </div>

        <div class="status" id="gameStatus">🌀 ПРОВЕДИ ЛИНИЮ ОТ ТОЧКИ ДО ТОЧКИ</div>
    </div>
</div>

<script>
    // ================================================================
    //  СВЯЖИ ТОЧКИ (FLOW) — ОДНА ЛИНИЯ, ЗАПОЛНИ ВСЕ КЛЕТКИ
    //  Автогенерация уровней, тёмный дизайн, рекорды
    // ================================================================

    (function() {
        'use strict';

        const MIN_SIZE = 5;
        const MAX_SIZE = 9;

        let board = [];
        let size = 5;
        let level = 1;
        let steps = 0;
        let path = [];
        let start = null;
        let end = null;
        let isComplete = false;
        let isLocked = false;
        let hintCount = 0;

        const boardEl = document.getElementById('board');
        const levelDisplay = document.getElementById('levelDisplay');
        const stepsDisplay = document.getElementById('stepsDisplay');
        const gameStatusSpan = document.getElementById('gameStatus');

        // ---- ГЕНЕРАЦИЯ УРОВНЯ ----
        function generateLevel() {
            // Определяем размер поля (рандомно)
            size = Math.floor(Math.random() * (MAX_SIZE - MIN_SIZE + 1)) + MIN_SIZE;
            // Сложность растёт с уровнем
            const complexity = Math.min(level, 3);

            board = Array.from({ length: size }, () => Array(size).fill(0));

            // Заполняем случайными препятствиями (блокированные клетки)
            const blockCount = Math.floor(size * size * (0.05 + complexity * 0.05));
            let blocked = 0;
            while (blocked < blockCount) {
                const r = Math.floor(Math.random() * size);
                const c = Math.floor(Math.random() * size);
                if (board[r][c] === 0) {
                    board[r][c] = 1; // 1 = заблокировано
                    blocked++;
                }
            }

            // Генерируем путь
            let pathCells = generatePath();
            while (!pathCells) {
                // Если не удалось сгенерировать путь — перегенерируем
                board = Array.from({ length: size }, () => Array(size).fill(0));
                pathCells = generatePath();
            }

            // Отрисовываем
            render();
            updateUI();
        }

        function generatePath() {
            // Ищем старт и финиш (крайние клетки)
            const startCandidates = [];
            const endCandidates = [];

            // Простые случаи: углы или края
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] === 1) continue;
                    const edge = (r === 0 || r === size - 1 || c === 0 || c === size - 1);
                    if (edge) {
                        if (startCandidates.length < 3) startCandidates.push({r, c});
                        else endCandidates.push({r, c});
                    }
                }
            }

            if (startCandidates.length === 0 || endCandidates.length === 0) {
                // Если нет краевых клеток — берём любые
                const free = [];
                for (let r = 0; r < size; r++) {
                    for (let c = 0; c < size; c++) {
                        if (board[r][c] === 0) free.push({r, c});
                    }
                }
                if (free.length < 2) return null;
                start = free[0];
                end = free[free.length - 1];
            } else {
                start = startCandidates[0];
                end = endCandidates[Math.floor(Math.random() * endCandidates.length)];
                if (!end) end = endCandidates[0];
            }

            // Строим путь (простой алгоритм — обход клеток)
            path = [];
            const visited = new Set();
            const queue = [{r: start.r, c: start.c, path: [{r: start.r, c: start.c}]}];

            while (queue.length > 0) {
                const current = queue.shift();
                const key = `${current.r},${current.c}`;
                if (visited.has(key)) continue;
                visited.add(key);

                if (current.r === end.r && current.c === end.c) {
                    path = current.path;
                    break;
                }

                const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
                for (const d of dirs) {
                    const nr = current.r + d[0];
                    const nc = current.c + d[1];
                    if (nr < 0 || nr >= size || nc < 0 || nc >= size) continue;
                    if (board[nr][nc] === 1) continue;
                    if (visited.has(`${nr},${nc}`)) continue;
                    const newPath = [...current.path, {r: nr, c: nc}];
                    queue.push({r: nr, c: nc, path: newPath});
                }
            }

            if (path.length < size * 2) {
                // Путь слишком короткий — перегенерируем
                return null;
            }

            // Помечаем путь на поле
            for (const p of path) {
                board[p.r][p.c] = 2; // 2 = путь
            }

            // Старт и финиш
            board[start.r][start.c] = 3; // 3 = старт
            board[end.r][end.c] = 4; // 4 = финиш

            return path;
        }

        // ---- ОТРИСОВКА ----
        function render() {
            boardEl.innerHTML = '';
            const cellSize = boardEl.clientWidth / size;

            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.r = r;
                    cell.dataset.c = c;
                    cell.style.width = cellSize + 'px';
                    cell.style.height = cellSize + 'px';
                    cell.style.left = (c * cellSize) + 'px';
                    cell.style.top = (r * cellSize) + 'px';

                    const val = board[r][c];
                    if (val === 1) cell.classList.add('blocked');
                    else if (val === 3) cell.classList.add('start');
                    else if (val === 4) cell.classList.add('end');
                    else if (val === 2) cell.classList.add('path');

                    cell.addEventListener('click', () => onCellClick(r, c));
                    boardEl.appendChild(cell);
                }
            }
        }

        // ---- КЛИК ПО КЛЕТКЕ ----
        function onCellClick(r, c) {
            if (isLocked || isComplete) return;
            if (board[r][c] === 1) return;

            // Если клетка уже часть пути — ничего не делаем
            if (board[r][c] === 2 || board[r][c] === 3 || board[r][c] === 4) return;

            // Если это финиш — проверяем, что путь завершён
            if (r === end.r && c === end.c) {
                if (isPathComplete()) {
                    isComplete = true;
                    gameStatusSpan.innerHTML = "🎉 УРОВЕНЬ ПРОЙДЕН!";
                    setTimeout(() => {
                        level++;
                        generateLevel();
                    }, 1000);
                } else {
                    gameStatusSpan.innerHTML = "❌ НЕ ВСЕ КЛЕТКИ ЗАПОЛНЕНЫ!";
                }
                return;
            }

            // Добавляем клетку в путь
            board[r][c] = 2;
            steps++;
            updateUI();
            render();

            // Проверяем, не тупик ли это (нет соседних свободных клеток)
            if (!hasFreeNeighbor(r, c)) {
                gameStatusSpan.innerHTML = "⚠️ ТУПИК! ПОПРОБУЙ ЗАНОВО";
                isLocked = true;
                setTimeout(() => {
                    isLocked = false;
                    resetLevel();
                }, 800);
            }
        }

        function hasFreeNeighbor(r, c) {
            const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
            for (const d of dirs) {
                const nr = r + d[0];
                const nc = c + d[1];
                if (nr < 0 || nr >= size || nc < 0 || nc >= size) continue;
                if (board[nr][nc] === 0) return true;
            }
            return false;
        }

        function isPathComplete() {
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] === 0) return false;
                }
            }
            return true;
        }

        // ---- ПОДСКАЗКА ----
        function showHint() {
            if (isComplete) return;
            hintCount++;
            // Ищем первую свободную клетку рядом с путём
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] === 2 || board[r][c] === 3) {
                        const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
                        for (const d of dirs) {
                            const nr = r + d[0];
                            const nc = c + d[1];
                            if (nr < 0 || nr >= size || nc < 0 || nc >= size) continue;
                            if (board[nr][nc] === 0) {
                                // Подсвечиваем клетку
                                const cells = boardEl.querySelectorAll('.cell');
                                cells.forEach(cell => {
                                    if (parseInt(cell.dataset.r) === nr && parseInt(cell.dataset.c) === nc) {
                                        cell.classList.add('highlight');
                                        setTimeout(() => cell.classList.remove('highlight'), 1000);
                                    }
                                });
                                gameStatusSpan.innerHTML = `💡 ПОДСКАЗКА: КЛЕТКА (${nr+1}, ${nc+1})`;
                                return;
                            }
                        }
                    }
                }
            }
            gameStatusSpan.innerHTML = "😅 НЕТ ДОСТУПНЫХ КЛЕТОК";
        }

        // ---- СБРОС УРОВНЯ ----
        function resetLevel() {
            // Очищаем путь, оставляем старт и финиш
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] === 2) board[r][c] = 0;
                    if (board[r][c] === 3) board[r][c] = 3;
                    if (board[r][c] === 4) board[r][c] = 4;
                }
            }
            steps = 0;
            isComplete = false;
            isLocked = false;
            updateUI();
            render();
            gameStatusSpan.innerHTML = "🌀 НАЧНИ ЗАНОВО";
        }

        // ---- UI ----
        function updateUI() {
            levelDisplay.textContent = level;
            stepsDisplay.textContent = steps;
        }

        // ---- ИНИЦИАЛИЗАЦИЯ ----
        function init() {
            generateLevel();
            document.getElementById('resetBtn').addEventListener('click', resetLevel);
            document.getElementById('hintBtn').addEventListener('click', showHint);
        }

        init();
    })();
</script>
</body>
</html>
